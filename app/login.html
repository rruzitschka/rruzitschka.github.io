<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendLog - Sign In</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            padding: var(--spacing-xl);
        }

        .login-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            color: var(--dark-bg);
        }

        .login-tagline {
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: var(--spacing-2xl);
            font-style: italic;
        }

        #auth-error {
            background-color: #fee2e2;
            color: #991b1b;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            margin-bottom: var(--spacing-lg);
            display: none;
            font-size: 0.95rem;
        }

        /* Apple HIG: Sign in with Apple button — black on light bg, min-height 44px, border-radius ≥6px */
        #signin-btn {
            width: 100%;
            min-height: 44px;
            padding: 0 1.25rem;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: opacity 0.15s ease;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        #signin-btn:hover:not(:disabled) {
            opacity: 0.85;
        }

        #signin-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .signin-apple-logo {
            width: 18px;
            height: 22px;
            fill: #ffffff;
            flex-shrink: 0;
            margin-top: -2px; /* optical alignment */
        }

        .login-requirement {
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            color: #166534;
            font-size: 0.9rem;
            margin-bottom: var(--spacing-lg);
        }

        .login-footer {
            border-top: 1px solid var(--border-color);
            padding-top: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-base);
            margin: 0 var(--spacing-md);
        }

        .login-footer a:hover {
            color: var(--accent-color);
        }

        .footer-link-separator {
            color: var(--border-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">SendLog</div>
            <p class="login-tagline">Your climbing logbook, everywhere.</p>

            <div id="auth-error"></div>

            <button id="signin-btn">
                <!-- Apple logo per Apple HIG (official SVG path) -->
                <svg class="signin-apple-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" aria-hidden="true">
                    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663.1 0 541.8c0-194.3 127-297.5 252-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
                </svg>
                <span>Sign in with Apple</span>
            </button>

            <div class="login-requirement">
                📱 Requires SendLog iOS app with Cloud Sync enabled
            </div>

            <div class="login-footer">
                <a href="../index.html">Learn more</a>
                <span class="footer-link-separator">|</span>
                <a href="../pages/policy.html">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-auth.js?v=3.7.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // If already signed in, go straight to the dashboard
            const user = await initAuth();
            if (user) {
                window.location.href = 'index.html';
                return;
            }

            const btn = document.getElementById('signin-btn');
            const errorDiv = document.getElementById('auth-error');
            const btnOriginalHTML = btn.innerHTML;

            function resetBtn() {
                btn.innerHTML = btnOriginalHTML;
                btn.disabled = false;
            }

            btn.addEventListener('click', async () => {
                btn.querySelector('span').textContent = 'Signing in…';
                btn.disabled = true;
                errorDiv.style.display = 'none';
                try {
                    await signInWithApple();
                    window.location.href = 'index.html';
                } catch (err) {
                    console.error('Sign-in error:', err);
                    errorDiv.textContent = 'Sign-in failed. Please try again.';
                    errorDiv.style.display = 'block';
                    resetBtn();
                }
            });
        });
    </script>
</body>
</html>
